version: '3.8'

services:
  # Database Service: PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: insightai-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insightai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insightai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API Service: FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightai-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@db:5432/${POSTGRES_DB:-insightai}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-super-secret-jwt-signing-key-token-phrase}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/datasets:/app/datasets
      - ./backend/models:/app/models
      - ./backend/reports:/app/reports

  # Frontend Client Service: Next.js 15
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insightai-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata:
