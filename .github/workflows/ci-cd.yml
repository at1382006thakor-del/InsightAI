name: InsightAI CI/CD pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Frontend Checks: Type checking, Linting, Build
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Next.js build validation
        run: |
          cd frontend
          npm run build

  # 2. Backend Checks: Linting and build verification
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install packages
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend import and compile verification
        run: |
          cd backend
          python -m py_compile app/main.py

  # 3. Docker Image Build Verifications
  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    steps:
      - uses: actions/checkout@v3

      - name: Verify Docker Compose config
        run: docker compose config

      - name: Build backend Docker Image
        run: |
          docker build -t insightai-backend:test ./backend

      - name: Build frontend Docker Image
        run: |
          docker build -t insightai-frontend:test ./frontend
